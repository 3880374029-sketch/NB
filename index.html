    // ---- 生成游戏数据 (4500个) ----
    function generateGames(count = 4500) {
      const games = [];
      const catKeys = Object.keys(gameNamePool);
      const basePerCat = Math.floor(count / catKeys.length);
      catKeys.forEach(cat => {
        const pool = gameNamePool[cat];
        for (let i = 0; i < basePerCat; i++) {
          const entry = pool[i % pool.length];
          const hasFree = Math.random() > 0.25;
          const hasPremium = Math.random() > 0.35;
          games.push({
            nameZh: entry.zh,
            nameEn: entry.en,
            category: cat,
            hasFree: hasFree,
            hasPremium: hasPremium,
            freeLink: hasFree ? generateItchLink(entry.zh) : '#',
            premiumLink: hasPremium ? generateSteamLink(entry.zh) : '#',
            gogLink: generateGogLink(entry.zh),
            epicLink: generateEpicLink(entry.zh),
            officialLink: generateOfficialLink(entry.zh)
          });
        }
      });
      // 补足剩余
      while (games.length < count) {
        const cat = catKeys[Math.floor(Math.random() * catKeys.length)];
        const pool = gameNamePool[cat];
        const entry = pool[Math.floor(Math.random() * pool.length)];
        const hasFree = Math.random() > 0.25;
        const hasPremium = Math.random() > 0.35;
        games.push({
          nameZh: entry.zh,
          nameEn: entry.en,
          category: cat,
          hasFree: hasFree,
          hasPremium: hasPremium,
          freeLink: hasFree ? generateItchLink(entry.zh) : '#',
          premiumLink: hasPremium ? generateSteamLink(entry.zh) : '#',
          gogLink: generateGogLink(entry.zh),
          epicLink: generateEpicLink(entry.zh),
          officialLink: generateOfficialLink(entry.zh)
        });
      }
      // 打乱
      for (let i = games.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [games[i], games[j]] = [games[j], games[i]];
      }
      return games;
    }

    // ---- 链接生成函数 ----
    function generateSteamLink(name) { return `https://store.steampowered.com/search/?term=${encodeURIComponent(name)}`; }
    function generateItchLink(name) { return `https://itch.io/search?q=${encodeURIComponent(name)}`; }
    function generateGogLink(name) { return `https://www.gog.com/en/games?search=${encodeURIComponent(name)}`; }
    function generateEpicLink(name) { return `https://store.epicgames.com/en-US/browse?q=${encodeURIComponent(name)}`; }
    function generateOfficialLink(name) { return `https://www.google.com/search?q=${encodeURIComponent(name)}+官网`; }

    const allGames = generateGames(4500);
    document.getElementById('gameCount').innerText = allGames.length;

    function getCategoryIcon(cat) {
      const map = { '射击':'fa-crosshairs','角色扮演':'fa-user-astronaut','动作':'fa-fist-raised','冒险':'fa-map','策略':'fa-chess-queen','竞速':'fa-car','体育':'fa-basketball-ball','格斗':'fa-user-ninja','MOBA':'fa-users','生存':'fa-skull','沙盒':'fa-cubes','卡牌':'fa-id-card' };
      return map[cat] || 'fa-gamepad';
    }

    // ---- 渲染 (根据当前语言显示游戏名) ----
    function renderGames(filterCategory = 'all') {
      const grid = document.getElementById('gameGrid');
      const filtered = filterCategory === 'all' ? allGames : allGames.filter(g => g.category === filterCategory);
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="no-games"><i class="fas fa-robot" style="font-size:3rem;opacity:0.3;"></i><p style="margin-top:1rem;">没有找到该分类的游戏</p></div>`;
        return;
      }
      // 根据当前语言选择显示名称
      const useZh = currentLang === 'zh';
      let html = '';
      filtered.forEach((game) => {
        const iconClass = getCategoryIcon(game.category);
        const displayName = useZh ? game.nameZh : game.nameEn;
        html += `
          <div class="game-card" data-category="${game.category}">
            <div class="category-badge">${game.category}</div>
            <div class="game-icon"><i class="fas ${iconClass}"></i><span class="game-tag"><i class="fas fa-cpu"></i> 科技</span></div>
            <div class="game-name">${displayName}</div>
            <div class="game-meta">
              <span style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
                ${game.hasFree ? '<span style="color:#2ecc71;"><i class="fas fa-circle"></i> 免费</span>' : ''}
                ${game.hasPremium ? '<span style="color:#f1c40f;"><i class="fas fa-certificate"></i> 正版</span>' : ''}
              </span>
              <div class="game-links">
                ${game.hasFree ? `<a href="${game.freeLink}" target="_blank" class="free"><i class="fas fa-download"></i> 免费</a>` : ''}
                ${game.hasPremium ? `<a href="${game.premiumLink}" target="_blank" class="premium"><i class="fas fa-crown"></i> 正版</a>` : ''}
                <a href="${game.gogLink}" target="_blank" class="gog"><i class="fas fa-shopping-bag"></i> GOG</a>
                <a href="${game.epicLink}" target="_blank" class="epic"><i class="fab fa-epic-games"></i> Epic</a>
                <a href="${game.officialLink}" target="_blank" class="official"><i class="fas fa-globe"></i> 官网</a>
              </div>
            </div>
          </div>
        `;
      });
      grid.innerHTML = html;
    }

    // ---- 筛选 ----
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        renderGames(this.dataset.category);
      });
    });

    // ---- 搜索 (匹配中文和英文) ----
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    function performSearch() {
      const query = searchInput.value.trim();
      if (!query) return;
      // 同时匹配 nameZh 和 nameEn
      const matched = allGames.find(g => g.nameZh.includes(query) || g.nameEn.toLowerCase().includes(query.toLowerCase()));
      if (matched) {
        const cards = document.querySelectorAll('.game-card');
        for (let card of cards) {
          const nameEl = card.querySelector('.game-name');
          if (nameEl && (nameEl.textContent.includes(query) || nameEl.textContent.toLowerCase().includes(query.toLowerCase()))) {
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.style.borderColor = '#4fc3ff';
            card.style.boxShadow = '0 0 30px rgba(0,180,255,0.6)';
            setTimeout(() => { card.style.borderColor = ''; card.style.boxShadow = ''; }, 3000);
            return;
          }
        }
        // 若未找到，切换到全部重新找
        const allTab = document.querySelector('.filter-tab[data-category="all"]');
        if (allTab) {
          allTab.click();
          setTimeout(() => {
            document.querySelectorAll('.game-card').forEach(card => {
              const nameEl = card.querySelector('.game-name');
              if (nameEl && (nameEl.textContent.includes(query) || nameEl.textContent.toLowerCase().includes(query.toLowerCase()))) {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                card.style.borderColor = '#4fc3ff';
                card.style.boxShadow = '0 0 30px rgba(0,180,255,0.6)';
                setTimeout(() => { card.style.borderColor = ''; card.style.boxShadow = ''; }, 3000);
              }
            });
          }, 100);
        }
      } else {
        alert('未找到相关游戏，请尝试其他关键词');
      }
    }
    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') performSearch(); });

    // ---- 初始化 ----
    // 设置初始语言为zh，界面文字已更新
    updateLanguage('zh');
    renderGames('all');
  })();
</script>
